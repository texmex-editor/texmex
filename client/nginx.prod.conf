server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed Vite bundles under /assets/* are content-addressable, so cache
    # forever and don't revalidate. New deploys ship new filenames; old
    # bundles can sit in browser caches indefinitely without stale-content
    # risk. Without this header browsers re-check every bundle on each page
    # load.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Favicon: 404 cleanly if missing instead of triggering the SPA fallback
    # below (which would return the full HTML shell with status 200 — wrong
    # MIME type and noisy in logs).
    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    # React Router (BrowserRouter): tell browsers to always revalidate the
    # HTML shell so a deploy doesn't leave clients on an old index.html
    # pointing at deleted hashed bundles.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Yjs WebSocket: backend route /ws/{documentId}
    location /ws {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
