[pytest]
# TexMex HTTP integration suite (Layer 2).
# Requires a running server (TEXMEX_BASE_URL, default http://localhost:3000),
# Postgres, and the latex-compiler container (for test_compile.py).
# Tests self-isolate via unique emails — no DB reset needed between runs.
#   python3 -m pytest tests/ -v
python_files = test_*.py
python_functions = test_*
addopts = -ra
