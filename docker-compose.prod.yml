# TexMex — Production Compose
#
# Alle Werte kommen aus einer Env-Datei (für Variablen-Interpolation im Compose-File):
#   cp .env.production.example .env.production
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# ALLOWED_ORIGINS muss exakt der Browser-Origin entsprechen (z. B. http://meinserver:8080).

name: texmex-prod

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-texmex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-texmex}
      POSTGRES_DB: ${POSTGRES_DB:-texmex}
    volumes:
      - texmex_prod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10

  latex-compiler:
    build:
      context: ./latex-compiler
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 9000

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      URLS: http://0.0.0.0:3000
      DATA_DIR: /data
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?Set ALLOWED_ORIGINS in your env file}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in your env file}
      LATEX_COMPILER_URL: ${LATEX_COMPILER_URL:-http://latex-compiler:9000}
    volumes:
      - texmex_prod_data:/data
    depends_on:
      latex-compiler:
        condition: service_started
      db:
        condition: service_healthy
    expose:
      - '3000'

  web:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
    depends_on:
      - server

volumes:
  texmex_prod_pgdata:
  texmex_prod_data:
